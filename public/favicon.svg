<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0f14"/>
      <stop offset="1" stop-color="#05070a"/>
    </linearGradient>
    <linearGradient id="stroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00ff9c"/>
      <stop offset="1" stop-color="#00e5ff"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="64" height="64" rx="12" fill="url(#bg)"/>
  <rect x="2.5" y="2.5" width="59" height="59" rx="10" fill="none"
        stroke="url(#stroke)" stroke-width="2"/>

  <g filter="url(#glow)" fill="none" stroke="#00ff9c"
     stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="14,22 22,32 14,42"/>
    <line x1="28" y1="44" x2="48" y2="44"/>
  </g>

  <rect x="50" y="18" width="3" height="8" fill="#00ff9c">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>
